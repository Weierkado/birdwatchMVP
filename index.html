<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认鸟手信 · 文字观鸟 demo</title>
    <link rel="stylesheet" href="./styles/style.css">
    <!-- modulepreload：并行预取 ES modules，减少级联加载等待。新增模块时需同步维护。 -->
    <link rel="modulepreload" href="./src/main.js">
    <link rel="modulepreload" href="./src/core/saveManager.js">
    <link rel="modulepreload" href="./src/core/telemetryAdapter.js">
    <link rel="modulepreload" href="./src/gameSession.js">
    <link rel="modulepreload" href="./src/gameState.js">
    <link rel="modulepreload" href="./src/birdManager.js">
    <link rel="modulepreload" href="./src/encounterSystem.js">
    <link rel="modulepreload" href="./src/photoSequence.js">
    <link rel="modulepreload" href="./src/focusEngine.js">
    <link rel="modulepreload" href="./src/focusSequence.js">
    <link rel="modulepreload" href="./src/fieldGuide.js">
    <link rel="modulepreload" href="./src/cardDraw.js">
    <link rel="modulepreload" href="./src/rarityDisplay.js">
    <link rel="modulepreload" href="./src/spotManager.js">
    <link rel="modulepreload" href="./src/storage.js">
    <link rel="modulepreload" href="./src/utils/config.js">
    <link rel="modulepreload" href="./src/utils/dom.js">
    <link rel="modulepreload" href="./src/utils/format.js">
    <link rel="modulepreload" href="./src/ui/bottomNav.js">
    <link rel="modulepreload" href="./src/ui/toolOverlayShell.js">
    <link rel="modulepreload" href="./data/cards.js">
    <link rel="modulepreload" href="./data/species.js">
    <link rel="modulepreload" href="./data/config.js">
    <link rel="modulepreload" href="./data/spots.js">
    <link rel="modulepreload" href="./data/focusConfig.js">
  </head>
  <body>
    <svg class="paper-filter-defs" width="0" height="0" aria-hidden="true" focusable="false">
      <filter id="paper-edge">
        <feTurbulence type="fractalNoise" baseFrequency="0.045" numOctaves="2" seed="8" result="noise"></feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.2" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
      </filter>
      <filter id="paper-soft">
        <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="1" seed="5" result="noise"></feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="0.8" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
      </filter>
    </svg>

    <div id="app-loading">
      <p class="app-loading-text">正在加载…</p>
    </div>

    <main class="page">
      <header class="site-header">
        <h1 id="gameTitle">裸辞之后，观鸟的第 1 天</h1>
        <p class="subtitle">把城市里的每一只鸟，寄给想念的人</p>
      </header>

      <section class="status-grid" aria-label="当前状态">
        <div class="status-item status-mode status-card-action">
          <button class="dashboard-card-button dashboard-card-button-primary" id="modeText" type="button" data-action="fieldGuide">打开笔记</button>
        </div>
        <div class="status-item status-turn">
          <span class="status-value status-combo-card" id="turnText">
            <span class="status-combo-section">
              <span class="status-combo-label">当前时间</span>
              <span class="status-combo-value time-of-day-dawn">清晨</span>
            </span>
            <span class="status-combo-divider" aria-hidden="true"></span>
            <span class="status-combo-section">
              <span class="status-combo-label">当前电量</span>
              <span class="battery-widget is-high" aria-label="剩余电量：4格">
                <span class="battery-shell" aria-hidden="true">
                  <span class="battery-cells">
                    <span class="battery-cell is-filled"></span>
                    <span class="battery-cell is-filled"></span>
                    <span class="battery-cell is-filled"></span>
                    <span class="battery-cell is-filled"></span>
                  </span>
                </span>
              </span>
            </span>
          </span>
        </div>
        <div class="status-item status-spot status-card-action">
          <button class="dashboard-card-button dashboard-card-button-placeholder" id="spotText" type="button" aria-disabled="true">查看消息</button>
        </div>
        <div class="status-item status-direction">
          <span class="status-label">方向</span>
          <span class="status-value" id="directionText">北侧树篱</span>
        </div>
        <div class="status-item status-sd">
          <span class="status-label">位置</span>
          <span class="status-value" id="sdCardText">
            花园边 · 北侧树篱
          </span>
        </div>
        <div class="status-item status-photo-timing">
          <span class="status-label">拍摄时机</span>
          <span class="status-value" id="photoTimingText">--</span>
        </div>
      </section>

      <section class="event-box" aria-live="polite">
        <h2 class="sr-only">事件描述</h2>
        <p id="eventText">从一个鸟点开始今天的观察。</p>
      </section>

      <section class="action-panel" id="actionPanel" aria-label="行动按钮"></section>

      <section class="layout">
        <section class="panel" id="detailPanel"></section>

        <section class="panel log-panel">
          <h2>观察日志</h2>
          <ul class="log-list" id="logList"></ul>
        </section>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
